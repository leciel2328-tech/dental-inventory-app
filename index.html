<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歯科在庫管理アプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      color: #666;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select, button {
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4b8cff;
      box-shadow: 0 0 0 3px rgba(75,140,255,0.15);
    }

    .full {
      grid-column: span 4;
    }

    .two {
      grid-column: span 2;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #222;
    }

    .success {
      background: #16a34a;
      color: #fff;
    }

    .danger {
      background: #dc2626;
      color: #fff;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      min-width: 220px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: #fff;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      font-size: 14px;
    }

    .days {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .days.safe {
      color: #16a34a;
    }

    .days.warn {
      color: #d97706;
    }

    .days.danger {
      color: #dc2626;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-safe {
      background: #dcfce7;
      color: #166534;
    }

    .badge-warn {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .item-name {
      font-weight: 700;
      font-size: 16px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .small-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-actions button {
      padding: 8px 10px;
      font-size: 14px;
    }

    .notice {
      margin-top: 10px;
      font-size: 14px;
      color: #2563eb;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .full {
        grid-column: span 2;
      }

      .two {
        grid-column: span 2;
      }
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .full, .two {
        grid-column: span 1;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>歯科在庫管理アプリ</h1>
      <p>入力しやすさ重視・連続登録対応</p>
    </div>

    <div class="card">
      <h2 id="formTitle">新規登録</h2>
      <div class="form-grid">
        <div class="form-group two">
          <label for="itemName">材料名</label>
          <input id="itemName" type="text" placeholder="例：グローブ Sサイズ" />
        </div>

        <div class="form-group">
          <label for="quantity">在庫数</label>
          <input id="quantity" type="number" placeholder="例：5" />
        </div>

        <div class="form-group">
          <label for="unit">単位</label>
          <select id="unit">
            <option value="箱">箱</option>
            <option value="個">個</option>
            <option value="本">本</option>
            <option value="枚">枚</option>
            <option value="袋">袋</option>
            <option value="セット">セット</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dailyUse">1日使用量</label>
          <input id="dailyUse" type="number" step="0.1" placeholder="例：0.5" />
        </div>

        <div class="form-group">
          <label for="category">分類</label>
          <input id="category" type="text" placeholder="例：消耗品" />
        </div>

        <div class="form-group two">
          <label for="memo">メモ</label>
          <input id="memo" type="text" placeholder="例：診療室でよく使う" />
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="saveItem()">保存</button>
        <button class="success" onclick="saveAndNext()">保存して続けて入力</button>
        <button class="secondary" onclick="resetForm()">入力リセット</button>
      </div>

      <div class="notice" id="noticeArea"></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="search" class="search-box" type="text" placeholder="材料名で検索" oninput="renderTable()" />
          <select id="filterStatus" onchange="renderTable()">
            <option value="all">すべて表示</option>
            <option value="danger">危険のみ</option>
            <option value="warn">注意のみ</option>
            <option value="safe">安全のみ</option>
          </select>
        </div>
        <div>
          <button class="secondary" onclick="seedSample()">サンプル追加</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>材料名</th>
              <th>分類</th>
              <th>在庫</th>
              <th>1日使用量</th>
              <th>残り日数</th>
              <th>状態</th>
              <th>メモ</th>
              <th>操作</
